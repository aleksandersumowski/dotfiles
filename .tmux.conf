# use C-a, since it's on the home row and easier to hit than C-b
set-option -g prefix C-a
set -g focus-events on
unbind-key C-a
bind-key C-a send-prefix
set -g base-index 1

bind r source-file ~/.tmux.conf
set -g history-limit 10000

# vi is good
setw -g mode-keys vi

# mouse behavior
set-option -g mouse on

set-option -g default-terminal screen-256color
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g renumber-windows on

bind-key : command-prompt
bind-key enter next-layout

# use vim-like keys for splits and windows
bind-key v split-window -h
bind-key s split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key ^H select-pane -L
bind-key ^K select-pane -U
bind-key ^J select-pane -D
bind-key ^L select-pane -R

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

#switch to last window & pane
bind-key C-a last-window
bind-key C-s last-pane

bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

bind-key l last-pane
bind-key q display-panes
bind-key c new-window
bind-key t next-window
bind-key T previous-window

bind-key [ copy-mode
bind-key ] paste-buffer

# Status Bar
set-option -g status-interval 1
set-option -g status-left '#{prefix_highlight}'
set -g status-right '%Y-%m-%d %H:%M'
set-window-option -g window-status-current-style fg=magenta
set-option -g status-style fg=default

# Status Bar solarized-dark (default)
set-option -g status-bg black
set-option -g pane-active-border-style fg=black
set-option -g pane-border-style fg=black

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on
set -g visual-bell on

# Allow the arrow key to be used immediately after changing windows
set-option -g repeat-time 0

# escape delay is too long, set to 0
set -s escape-time 0

bind -n C-k send-keys -R \; clear-history
bind -n ^k send-keys -R \; clear-history

# Smart pane switching with awareness of vim splits
# vim-tmux-navigator
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

set -g @colors-solarized 'dark'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'seebi/tmux-colors-solarized'

set -g @resurrect-strategy-nvim 'session'
set -g @extrakto_fzf_tool '/usr/bin/fzf'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
